<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moment Troc · Studio V4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F0E8;--surface:#EDE8DF;--surface2:#E4DDD4;
  --ink:#1A1714;--ink-mid:rgba(26,23,20,0.52);--ink-dim:rgba(26,23,20,0.25);
  --rust:#B5451B;--rust-dim:rgba(181,69,27,0.10);--rust-line:rgba(181,69,27,0.28);
  --border:rgba(26,23,20,0.09);--border-hard:rgba(26,23,20,0.18);
  /* Calendrier */
  --cal-bg:#0E0C09;--cal-surface:#1A1714;--cal-surface2:#221E1A;
  --cal-gold:#C9A84C;--cal-gold-dim:rgba(201,168,76,0.15);--cal-gold-line:rgba(201,168,76,0.35);
  --cal-border:rgba(255,255,255,0.07);--cal-border-hard:rgba(255,255,255,0.13);
  --cal-ink:#F5F0E8;--cal-ink-mid:rgba(245,240,232,0.45);--cal-ink-dim:rgba(245,240,232,0.2);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}

body{background:var(--bg);color:var(--ink);font-family:'Playfair Display',Georgia,serif;font-size:1rem;line-height:1.75;min-height:100vh;padding:32px 20px 110px;max-width:660px;margin:0 auto;}
.eyebrow{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--rust);margin-bottom:8px;display:block;}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2.2rem,9vw,3rem);font-weight:900;line-height:0.95;text-transform:uppercase;letter-spacing:-0.02em;color:var(--ink);margin-bottom:10px;}
.sub{font-style:italic;color:var(--ink-mid);font-size:0.93rem;margin-bottom:24px;line-height:1.6;}
textarea,input[type=password]{width:100%;background:var(--surface2);border:none;border-left:3px solid var(--rust-line);color:var(--ink);padding:14px 16px;font-family:'Playfair Display',serif;font-size:1rem;line-height:1.7;resize:vertical;outline:none;margin-top:8px;transition:border-color 0.2s;-webkit-appearance:none;border-radius:0;}
textarea:focus,input:focus{border-left-color:var(--rust);}
.btn{display:block;width:100%;padding:15px 18px;border:none;font-family:'Space Mono',monospace;font-size:0.63rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all 0.18s;background:transparent;text-align:center;text-decoration:none;border-radius:0;}
.btn-primary{color:var(--rust);border:1px solid var(--rust-line);border-left:3px solid var(--rust);}
.btn-primary:hover,.btn-primary:active{background:var(--rust-dim);}
.btn-ghost{color:var(--ink-mid);border:1px solid var(--border-hard);}
.btn-ghost:hover,.btn-ghost:active{border-color:var(--rust-line);color:var(--ink);}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{margin-top:0;flex:1;}
.card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--rust);padding:18px;margin-bottom:14px;}
.card-label{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--rust);margin-bottom:10px;display:block;}
.diag-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.65rem;gap:12px;}
.diag-row:last-child{border-bottom:none;}
.diag-key{color:var(--ink-dim);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.diag-val{color:var(--rust);text-align:right;max-width:65%;line-height:1.4;}
.niveau-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 16px;}
.niv{background:var(--surface2);border:1px solid var(--border-hard);border-left:3px solid transparent;padding:13px 11px;cursor:pointer;transition:all 0.18s;text-align:left;}
.niv.on{border-left-color:var(--rust);background:var(--rust-dim);}
.niv .nt{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:3px;}
.niv .nd{font-style:italic;font-size:0.78rem;color:var(--ink-mid);line-height:1.35;}
.maitre-preview{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rust-line);padding:14px;margin-bottom:8px;}
.maitre-preview .mp-name{font-family:'Archivo Black',sans-serif;font-size:0.82rem;text-transform:uppercase;color:var(--ink);display:block;margin-bottom:2px;}
.maitre-preview .mp-il{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:4px;}
.maitre-preview .mp-desc{font-style:italic;font-size:0.8rem;color:var(--ink-mid);line-height:1.4;}
.prompt-box{background:var(--surface2);border-left:3px solid var(--rust);padding:16px;font-family:'Space Mono',monospace;font-size:0.68rem;line-height:1.85;color:var(--ink);white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;margin:10px 0;}
.arsenal-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rust-line);padding:16px;margin-bottom:10px;position:relative;}
.arsenal-item .am{font-family:'Space Mono',monospace;font-size:0.53rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;}
.arsenal-item .at{font-size:0.93rem;line-height:1.7;color:var(--ink);white-space:pre-wrap;}
.arsenal-item .ad{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ink-dim);font-family:'Space Mono',monospace;font-size:0.53rem;cursor:pointer;text-transform:uppercase;}
.err{color:#c0392b;font-family:'Space Mono',monospace;font-size:0.68rem;margin-top:8px;padding:10px 14px;background:rgba(192,57,43,0.05);border-left:3px solid #c0392b;}
.off{display:none!important;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}

.score-bars{margin:14px 0;}
.score-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.score-bar-label{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);width:120px;flex-shrink:0;}
.score-bar-track{flex:1;height:4px;background:var(--border-hard);position:relative;}
.score-bar-fill{height:100%;background:var(--rust);transition:width 0.4s;}
.score-bar-pct{font-family:'Space Mono',monospace;font-size:0.55rem;color:var(--rust);width:32px;text-align:right;}

.decon-bloc{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rust);padding:14px;margin-bottom:10px;}
.decon-bloc-title{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:3px;text-transform:uppercase;color:var(--rust);margin-bottom:8px;display:block;}
.decon-item{font-size:0.85rem;color:var(--ink);line-height:1.6;padding:5px 0;border-bottom:1px solid var(--border);}
.decon-item:last-child{border-bottom:none;}
.decon-tag{display:inline-block;font-family:'Space Mono',monospace;font-size:0.5rem;letter-spacing:2px;text-transform:uppercase;padding:2px 7px;border:1px solid var(--rust-line);color:var(--rust);margin-right:6px;margin-bottom:4px;}
.btn-claude{color:#7C3AED;border:1px solid rgba(124,58,237,0.3);border-left:3px solid #7C3AED;}
.btn-claude:hover,.btn-claude:active{background:rgba(124,58,237,0.08);}
.btn-gpt{color:#10A37F;border:1px solid rgba(16,163,127,0.3);border-left:3px solid #10A37F;}
.btn-gpt:hover,.btn-gpt:active{background:rgba(16,163,127,0.08);}

#page-cal{display:none;background:var(--cal-bg);min-height:100vh;padding:32px 16px 110px;max-width:660px;margin:0 auto;}
#page-cal h1{color:var(--cal-ink);font-family:'Archivo Black',sans-serif;font-size:clamp(2.4rem,10vw,3.2rem);line-height:0.9;text-transform:uppercase;letter-spacing:-0.02em;margin-bottom:4px;}
#page-cal .cal-sub{font-family:'Playfair Display',serif;font-style:italic;color:var(--cal-ink-mid);font-size:0.93rem;line-height:1.6;margin-bottom:28px;}
.cal-zone-label{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:4px;text-transform:uppercase;color:var(--cal-gold);margin:18px 0 8px;display:flex;align-items:center;gap:10px;}
.cal-zone-label::after{content:'';flex:1;height:1px;background:var(--cal-gold-line);}
.cal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:6px;}
.cal-cell{background:var(--cal-surface);border:1px solid var(--cal-border);padding:10px 8px;min-height:72px;cursor:pointer;transition:all 0.18s;position:relative;display:flex;flex-direction:column;justify-content:space-between;}
.cal-cell.empty{border-style:dashed;justify-content:center;align-items:center;}
.cal-cell.filled{border-left:3px solid var(--cal-gold);}
.cal-cell.active-day{border:2px solid var(--cal-gold);background:var(--cal-gold-dim);}
.cal-cell:hover{border-color:var(--cal-gold-line);}
.cal-cell .cc-day{font-family:'Space Mono',monospace;font-size:0.52rem;letter-spacing:2px;text-transform:uppercase;color:var(--cal-ink-dim);}
.cal-cell .cc-num{font-family:'Archivo Black',sans-serif;font-size:1.3rem;color:var(--cal-ink);line-height:1;}
.cal-cell .cc-profil{font-family:'Space Mono',monospace;font-size:0.44rem;letter-spacing:2px;text-transform:uppercase;color:var(--cal-gold);margin-top:4px;}
.cal-cell .cc-ep{font-family:'Space Mono',monospace;font-size:0.44rem;color:var(--cal-ink-dim);}
.cal-cell .cc-plus{font-size:1.2rem;color:var(--cal-border-hard);}
.cal-modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.cal-modal-inner{background:var(--cal-surface2);border-top:3px solid var(--cal-gold);padding:24px 20px 40px;width:100%;max-width:660px;max-height:80vh;overflow-y:auto;}
.cal-modal-title{font-family:'Archivo Black',sans-serif;font-size:1.4rem;text-transform:uppercase;color:var(--cal-ink);margin-bottom:4px;}
.cal-modal-meta{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--cal-gold);margin-bottom:16px;}
.cal-modal-post{font-family:'Playfair Display',serif;font-size:0.9rem;line-height:1.75;color:var(--cal-ink-mid);white-space:pre-wrap;border-left:3px solid var(--cal-gold-line);padding-left:14px;margin-bottom:16px;}
.btn-cal{display:block;width:100%;padding:13px 16px;border:none;font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:8px;background:transparent;text-align:center;border-radius:0;transition:all 0.18s;}
.btn-cal-gold{color:var(--cal-gold);border:1px solid var(--cal-gold-line);border-left:3px solid var(--cal-gold);}
.btn-cal-gold:hover{background:var(--cal-gold-dim);}
.btn-cal-dim{color:var(--cal-ink-dim);border:1px solid var(--cal-border-hard);}
.btn-cal-dim:hover{color:var(--cal-ink);border-color:var(--cal-gold-line);}

.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border-hard);display:flex;justify-content:space-around;padding:8px 0 14px;z-index:100;transition:background 0.3s,border-color 0.3s;}
.nav.dark{background:var(--cal-bg);border-top-color:var(--cal-border-hard);}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 10px;opacity:0.3;transition:opacity 0.2s;}
.nb.on{opacity:1;}
.nb .ni{font-size:1.1rem;}
.nb .nl{font-family:'Space Mono',monospace;font-size:0.42rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
.nav.dark .nb .nl{color:var(--cal-ink);}
</style>
</head>
<body>
<div id="page-main"><div id="app"></div></div>
<div id="page-cal">
  <span style="font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:4px;text-transform:uppercase;color:var(--cal-gold);display:block;margin-bottom:8px;">Moment Troc · 30 Jours</span>
  <h1>TON<br><em style="font-family:'Playfair Display',serif;font-weight:400;font-style:italic;font-size:0.65em;">plan de tir.</em></h1>
  <p class="cal-sub">Chaque post sauvegardé se place automatiquement sur le bon jour. Clique sur une case pour lire, recycler ou déconstruire.</p>
  <div id="cal-content"></div>
</div>
<nav class="nav" id="main-nav" style="display:none;">
  <button class="nb on" id="nb-studio" onclick="goNav('studio')"><span class="ni">✦</span><span class="nl">Studio</span></button>
  <button class="nb" id="nb-arsenal" onclick="goNav('arsenal')"><span class="ni">◈</span><span class="nl">Arsenal</span></button>
  <button class="nb" id="nb-decon" onclick="goNav('decon')"><span class="ni">⊘</span><span class="nl">Décon</span></button>
  <button class="nb" id="nb-cal" onclick="goNav('cal')"><span class="ni">◷</span><span class="nl">Plan</span></button>
</nav>

<script>
/* DONNÉES */
var KEYS=['MKB2000-2022A','MT-A1B2-C3D4','MT-E5F6-G7H8','MT-I9J0-K1L2','MT-M3N4-O5P6','MT-Q7R8-S9T0','MT-U1V2-W3X4','MT-Y5Z6-A7B8','MT-C9D0-E1F2','MT-G3H4-I5J6','MT-K7L8-M9N0','MT-O1P2-Q3R4','MT-S5T6-U7V8','MT-W9X0-Y1Z2','MT-A3B4-C5D6','MT-E7F8-G9H0','MT-I1J2-K3L4','MT-M5N6-O7P8','MT-Q9R0-S1T2','MT-U3V4-W5X6'];

/* MOTS-CLÉS PONDÉRÉS — poids 3=fort, 2=moyen, 1=faible */
var PROFILS={
  AUTOMATISEUR:{
    organe:'Cortex Préfrontal',
    tension:"J'ai tout essayé, rien ne marche, je suis noyé.",
    desir:"Un rail. Une séquence précise. Un résultat aujourd'hui.",
    mots:[
      {m:'workflow',p:3},{m:'automatisation',p:3},{m:'process',p:3},{m:'api',p:3},{m:'séquence',p:3},
      {m:'méthode',p:2},{m:'étapes',p:2},{m:'système',p:2},{m:'chemin',p:2},{m:'guide',p:2},
      {m:'outil',p:2},{m:'freelance',p:2},{m:'intermédiaire',p:2},
      {m:'simple',p:1},{m:'rapide',p:1},{m:'plan',p:1},{m:'accès',p:1}
    ],
    maitres:['scofield','mrrobot','itachi']
  },
  OPTIMISEUR_VALEUR:{
    organe:'Striatum',
    tension:"J'investis sans savoir si ça va rapporter.",
    desir:"La certitude que chaque franc investi rapporte.",
    mots:[
      {m:'roi',p:3},{m:'rentable',p:3},{m:'rendement',p:3},{m:'marge',p:3},
      {m:'retour sur investissement',p:3},{m:'calcul',p:2},{m:'résultat',p:2},
      {m:'efficace',p:2},{m:'budget',p:2},{m:'valeur',p:2},{m:'productivité',p:2},
      {m:'investissement',p:1},{m:'chiffre',p:1}
    ],
    maitres:['tyrion','moriarty','bismarck']
  },
  OPTIMISEUR_PRIX:{
    organe:'Insula',
    tension:"J'ai peur de me faire arnaquer encore.",
    desir:"Le juste prix. La transparence totale.",
    mots:[
      {m:'arnaque',p:3},{m:'transparent',p:3},{m:'remboursement',p:3},{m:'garantie',p:3},
      {m:'risque',p:2},{m:'juste',p:2},{m:'confiance',p:2},{m:'prix',p:2},
      {m:'coût',p:1},{m:'cher',p:1},{m:'payer',p:1}
    ],
    maitres:['hannibal','iago','palpatine']
  },
  ELEVATEUR:{
    organe:'Noyau Accumbens',
    tension:"Les autres réussissent, pas moi. Je ne suis pas crédible.",
    desir:"L'image qui force le respect avant même de parler.",
    mots:[
      {m:'image',p:3},{m:'prestige',p:3},{m:'élite',p:3},{m:'premium',p:3},{m:'admiration',p:3},
      {m:'statut',p:2},{m:'respect',p:2},{m:'crédibilité',p:2},{m:'reconnaissance',p:2},{m:'marque',p:2},
      {m:'regard',p:1},{m:'réussir',p:1},{m:'visible',p:1}
    ],
    maitres:['frank','will_aime','baelish']
  },
  LIBERATEUR:{
    organe:'Cortex Cingulaire',
    tension:"Les méthodes standard ne marchent pas pour moi.",
    desir:"Qu'on reconnaisse ma singularité.",
    mots:[
      {m:'différent',p:3},{m:'unique',p:3},{m:'sur mesure',p:3},{m:'atypique',p:3},{m:'singulier',p:3},
      {m:'adapté',p:2},{m:'liberté',p:2},{m:'indépendance',p:2},{m:'normes',p:2},
      {m:'ma façon',p:2},{m:'libérer',p:1},{m:'moi',p:1}
    ],
    maitres:['youssoupha','v','joker']
  }
};

var MAITRES={
  bismarck:{n:'Bismarck',il:'Force Tranquille',im:'T1',desc:"Il n'argumente pas. Il décrète. T1 pose l'autorité sans l'expliquer. Ce qu'il ne fait pas : ne justifie jamais.",tags:['autorité','statut','leadership','crédibilité']},
  will_aime:{n:'Will Aime',il:'Vertige Contrôlé',im:'Suture',desc:"Guide dans une pièce familière. La Suture fait basculer les murs. Ce qu'il ne fait pas : ne révèle jamais trop tôt.",tags:['émotion','transformation','reconnaissance','identité']},
  itachi:{n:'Itachi',il:'Genjutsu',im:'T4',desc:"Le lecteur croit lire un post normal. T4 brise l'illusion. Ce qu'il ne fait pas : ne montre jamais le piège à l'avance.",tags:['illusion','révélation','surprise','profil']},
  scofield:{n:'Scofield',il:'Blueprint',im:'T1',desc:"T1 construit un couloir invisible. Le lecteur suit sans voir le plan. Ce qu'il ne fait pas : n'explique jamais le plan.",tags:['accès','étapes','méthode','système','technique','api','freelance']},
  tyrion:{n:'Tyrion',il:'Scalpel Court',im:'T2',desc:"La phrase courte bat la longue. T2 est un coup de lame. Ce qu'il ne fait pas : ne s'explique jamais.",tags:['argumentation','objection','comparaison','prix']},
  hannibal:{n:'Hannibal',il:'Scalpel',im:'T2',desc:"Dissèque sans douleur. T2 nomme ce que le lecteur cache. Ce qu'il ne fait pas : ne juge jamais.",tags:['psychologie','comportement','habitude','peur','diagnostic']},
  joker:{n:'Le Joker',il:'Chaos Calculé',im:'T1',desc:"T1 ouvre par une vérité absurde. Le lecteur rit jaune puis se reconnaît. Ce qu'il ne fait pas : n'est jamais gratuit.",tags:['humour','ironie','paradoxe','marketing']},
  moriarty:{n:'Moriarty',il:"3 Coups d'Avance",im:'T4',desc:"T4 révèle que tout était prévu. Ce qu'il ne fait pas : ne révèle jamais avant T4.",tags:['stratégie','intelligence','vente','prévision']},
  palpatine:{n:'Palpatine',il:'Faux Mentor',im:'T4',desc:"Ne donne jamais la réponse. T4 pose la question qui déstabilise. Ce qu'il ne fait pas : ne rassure jamais.",tags:['doute','questionnement','coaching','mentor']},
  iago:{n:'Iago',il:'Poison Verbal',im:'Suture',desc:"La Suture chuchote ce que le lecteur refuse d'entendre. Ce qu'il ne fait pas : ne crie jamais.",tags:['vérité','déni','inconfort','prise de conscience']},
  cobb:{n:'Cobb',il:'Inception',im:'T4',desc:"T4 dépose une idée simple presque anodine. Elle grandit après la lecture. Ce qu'il ne fait pas : n'argumente jamais.",tags:['idée','influence','long terme']},
  mrrobot:{n:'Mr. Robot',il:'Bug dans la Matrice',im:'T3',desc:"T3 dénonce le système. Montre que le jeu est truqué. Ce qu'il ne fait pas : ne propose jamais de consolation.",tags:['système','blocage','accès','carte bancaire','afrique','injustice']},
  tyler:{n:'Tyler Durden',il:'Destruction du Confort',im:'T2',desc:"T2 attaque ce que le lecteur croit être une qualité. Ce qu'il ne fait pas : ne ménage jamais.",tags:['confort','sécurité','stagnation','routine']},
  baelish:{n:'Baelish',il:'Chaos comme Échelle',im:'T3',desc:"T3 montre que le chaos est une opportunité. Ce qu'il ne fait pas : ne moralise jamais.",tags:['opportunité','chaos','marché','positionnement']},
  frank:{n:'Frank Underwood',il:'4e Mur',im:'T1',desc:"T1 brise le quatrième mur. Juste toi et moi. Ce qu'il ne fait pas : ne parle jamais à la foule.",tags:['confidence','secret','exclusivité','personal branding']},
  v:{n:'V',il:'Révolution Silencieuse',im:'T4',desc:"T4 fait tomber un masque. Révèle une vérité cachée. Ce qu'il ne fait pas : ne crie jamais sa révolte.",tags:['libération','vérité','changement','mouvement']},
  youssoupha:{n:'Youssoupha',il:'Uppercut Philosophique',im:'T2',desc:"Vérité brutale en une phrase. T2 frappe et s'arrête. T3 relève ensuite. Ce qu'il ne fait pas : n'explique jamais l'uppercut.",tags:['vérité','philosophie','réalité','afrique','freelance']}
};

/* SCORE PONDÉRÉ */
function scoreProfils(txt){
  var t=txt.toLowerCase();
  var scores={};
  var totaux={};
  Object.keys(PROFILS).forEach(function(k){
    var s=0;
    var total=0;
    PROFILS[k].mots.forEach(function(entry){
      total+=entry.p;
      if(t.indexOf(entry.m)!==-1) s+=entry.p;
    });
    scores[k]=s;
    totaux[k]=total;
  });
  // Normaliser en pourcentage du max possible
  var pcts={};
  var grandTotal=0;
  Object.keys(scores).forEach(function(k){
    pcts[k]=totaux[k]>0?Math.round((scores[k]/totaux[k])*100):0;
    grandTotal+=pcts[k];
  });
  // Si aucun signal → par défaut AUTOMATISEUR à 20%
  if(grandTotal===0){pcts['AUTOMATISEUR']=20;}
  // Trouver le meilleur
  var best='AUTOMATISEUR',max=-1;
  Object.keys(pcts).forEach(function(k){if(pcts[k]>max){max=pcts[k];best=k;}});
  return {best:best,pcts:pcts,scores:scores};
}

function renderScoreBars(pcts){
  var max=0;
  Object.keys(pcts).forEach(function(k){if(pcts[k]>max)max=pcts[k];});
  if(max===0)max=1;
  var html='<div class="score-bars">';
  var ordre=['AUTOMATISEUR','OPTIMISEUR_VALEUR','OPTIMISEUR_PRIX','ELEVATEUR','LIBERATEUR'];
  var labels={'AUTOMATISEUR':'Automatiseur','OPTIMISEUR_VALEUR':'Opt. Valeur','OPTIMISEUR_PRIX':'Opt. Prix','ELEVATEUR':'Élévateur','LIBERATEUR':'Libérateur'};
  ordre.forEach(function(k){
    var pct=pcts[k];
    var w=Math.round((pct/max)*100);
    html+='<div class="score-bar-row">'+
      '<span class="score-bar-label">'+labels[k]+'</span>'+
      '<div class="score-bar-track"><div class="score-bar-fill" style="width:'+w+'%"></div></div>'+
      '<span class="score-bar-pct">'+pct+'%</span>'+
    '</div>';
  });
  html+='</div>';
  return html;
}

function copyText(txt,btnId,label){
  var btn=document.getElementById(btnId);
  var ok=function(){if(btn){btn.textContent='Copié !';setTimeout(function(){btn.textContent=label||'Copier le prompt';},2500);}};
  var fail=function(){
    var ta=document.createElement('textarea');
    ta.value=txt;ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;opacity:0;';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{if(document.execCommand('copy'))ok();}catch(e){}

  };

}

/* ANALYSE SURFACE */
function analyserPostSurface(txt){
  var t=txt;
  var tl=txt.toLowerCase();
  var result={};

  var phrases=t.split(/[.!?]+/).map(function(s){return s.trim();}).filter(function(s){return s.length>4;});
  var nbCourtes=0,nbLongues=0;
  phrases.forEach(function(ph){
    var mots=ph.split(/\s+/).length;
    if(mots<=12)nbCourtes++;else nbLongues++;
  });
  result.totalPhrases=phrases.length;
  result.phrasesCourtes=nbCourtes;
  result.phrasesLongues=nbLongues;
  result.rythme=nbCourtes>nbLongues?'Incitatif (phrases courtes dominantes)':'Dense (phrases longues dominantes)';

  result.tutoiement=(/\btu\b|\bton\b|\bta\b|\btes\b|\btoi\b|\bt\'|\bte\b/).test(tl);
  result.vouvoiement=(/\bvous\b|\bvotre\b|\bvos\b/).test(tl);

  result.premierePersInterne=(/\bje\b|\bj\'|\bmon\b|\bma\b|\bmes\b|\bme\b|\bmoi\b/).test(tl);
  var derniere=phrases[phrases.length-1]||'';
  result.questionFinale=derniere.indexOf('?')!==-1;
  result.nombreQuestions=(t.match(/\?/g)||[]).length;
  var longueurs=phrases.map(function(ph){return ph.split(/\s+/).length;});
  result.ruptureRythme=false;
  for(var i=1;i<longueurs.length;i++){
    if(longueurs[i]<=5&&longueurs[i-1]>=8){result.ruptureRythme=true;break;}
  }
  var interdits=['donc','ainsi','par conséquent','par consequent','en conclusion','il est important','n\'hésitez pas','contactez-moi','achetez','paix'];
  result.motsInterdits=interdits.filter(function(m){return tl.indexOf(m)!==-1;});
  result.emojis=(t.match(/[\u{1F300}-\u{1F9FF}]|[\u{2600}-\u{26FF}]/gu)||[]).length;
  result.hashtags=(t.match(/#\w+/g)||[]).length;
  var sd=scoreProfils(txt);
  result.profilProbable=sd.best;
  result.profilPcts=sd.pcts;
  result.chiffres=(t.match(/\d+/g)||[]).length;
  result.anecdote=(/un jour|j'ai |j\'ai |j'étais|j\'étais|il m'|il m\'|\bça m'|\bça m\'/).test(tl);
  var mecas=[];
  if((/rarissime|limité|exclusif|plus que|dernière place|derniere place/).test(tl))mecas.push('Rareté');
  if((/\d+\s*(personnes|clients|entrepreneurs|freelance|membres|abonnés)/).test(tl))mecas.push('Preuve sociale chiffrée');
  if((/gratuit|offert|cadeau|bonus/).test(tl))mecas.push('Réciprocité (don)');
  if((/avant\/après|avant que|après que|résultat en|en \d+ jours/).test(tl))mecas.push('Transformation temporelle');
  if((/tout le monde|personne ne|on t'a dit que|on vous a dit/).test(tl))mecas.push('Rupture de croyance collective');
  if((/secret|personne ne sait|rarement dit|jamais dit/).test(tl))mecas.push('Confidence / Exclusivité');
  result.mecasExternes=mecas;

  return result;
}

function blocsDetectes(r){
  var blocs=[];
  if(r.premierePersInterne&&r.anecdote)blocs.push({b:'T1',c:'Ancrage auteur détecté — première personne + récit passé.'});
  else if(r.premierePersInterne)blocs.push({b:'T1',c:'Ancrage auteur partiel — première personne présente mais sans récit.'});
  if(r.phrasesCourtes>=1)blocs.push({b:'T2',c:'Phrase(s) courte(s) détectée(s) — potentiel coup de lame.'});
  if(r.ruptureRythme)blocs.push({b:'Suture',c:'Rupture de rythme détectée — transition abrupte possible.'});
  if(r.chiffres>=2)blocs.push({b:'T3',c:'Chiffres multiples — séquence factuelle probable.'});
  if(r.questionFinale)blocs.push({b:'T4',c:'Question en fin de post — fermeture ouverte détectée.'});
  if(blocs.length===0)blocs.push({b:'Non structuré',c:'Aucun bloc clair détecté — structure libre.'});
  return blocs;
}

function ceQuiManque(r,blocs){
  var manque=[];
  var bnames=blocs.map(function(b){return b.b;});
  if(bnames.indexOf('T1')===-1)manque.push('T1 absent — le post n\'ancre pas l\'auteur dans une expérience vécue.');
  if(bnames.indexOf('T2')===-1)manque.push('T2 absent — aucune phrase courte qui déchire une certitude.');
  if(bnames.indexOf('Suture')===-1)manque.push('Suture absente — pas de rupture de rythme entre T2 et T3.');
  if(bnames.indexOf('T3')===-1)manque.push('T3 absent — pas de séquence factuelle. Le post explique au lieu de montrer.');
  if(bnames.indexOf('T4')===-1)manque.push('T4 absent — le post se ferme sans laisser de tension résiduelle.');
  if(!r.tutoiement&&!r.vouvoiement)manque.push('Pas d\'adresse directe au lecteur.');
  if(r.emojis>0)manque.push('Emojis présents ('+r.emojis+') — dilue l\'autorité du texte.');
  if(r.hashtags>0)manque.push('Hashtags présents ('+r.hashtags+') — signal de contenu générique.');
  if(r.motsInterdits.length>0)manque.push('Mots parasites : '+r.motsInterdits.join(', ')+'.');
  if(r.phrasesLongues>r.phrasesCourtes)manque.push('Phrases trop longues en majorité — le rythme ne coupe pas.');
  return manque;
}

function anglesInexploites(r){
  var angles=[];
  var p=r.profilProbable;
  var pcts=r.profilPcts;
  // Profil secondaire
  var ordre=Object.keys(pcts).sort(function(a,b){return pcts[b]-pcts[a];});
  if(ordre.length>=2&&pcts[ordre[1]]>0){
    angles.push('Angle '+ordre[1].replace(/_/g,' ')+' inexploité ('+pcts[ordre[1]]+'% de signal) — tension secondaire disponible.');
  }
  if(!r.anecdote)angles.push('Anecdote personnelle absente — un fait réel vécu renforcerait T1.');
  if(r.chiffres===0)angles.push('Aucun chiffre — un fait concret précis ancrerait T3.');
  if(!r.questionFinale&&r.nombreQuestions===0)angles.push('Aucune question — T4 pourrait ouvrir une porte au lieu de conclure.');
  if(r.mecasExternes.length===0)angles.push('Aucun mécanisme d\'amplification externe — rareté, preuve sociale ou transformation temporelle possible.');
  return angles;
}

'─── STRUCTURE DU TUNNEL (4 niveaux) ───\n'+
'Masque : audience qui ne connaît pas encore l\'auteur.\n'+
'Déclencheur : audience qui voit mais ne comprend pas.\n'+
'Fissure : audience qui reconnaît, pas encore acheteuse.\n'+
'Reconstruction : audience prête à convertir.\n\n'+
'─── STRUCTURE D\'UN POST (5 blocs) ───\n'+
'T1 : Vue de l\'intérieur. L\'auteur parle de ce qu\'il vit.\n'+
'T2 : Une phrase courte (≤12 mots) qui déchire une certitude.\n'+
'SUTURE : Maximum 8 mots. Aucun connecteur. Un fait brut.\n'+
'T3 : Séquence de faits. Une ligne par fait. Pas d\'explication.\n'+
'T4 : Fermeture ouverte — question, constat ou révélation.\n\n'+
'─── 5 PROFILS D\'ACHETEURS ───\n'+
profilsStr+'\n\n'+
'─── 17 MAÎTRES ───\n'+
maitresStr+'\n\n'+
'─── ANALYSE DE SURFACE DÉJÀ FAITE ───\n'+
'Blocs détectés :\n'+blocsStr+'\n'+
'Ce qui manque :\n'+manqueStr+'\n'+
'Angles non exploités :\n'+anglesStr+'\n\n'+
'─── POST À DÉCONSTRUIRE ───\n'+
post+'\n\n'+
'─── CE QUE TU DOIS FAIRE ───\n\n'+
'BLOC 1 — MÉCANISMES UTILISÉS\n'+
'Liste tous les mécanismes présents dans ce post.\n'+
'Inclure les mécanismes Moment Troc (blocs T1-T4, Suture, Maîtres) ET les mécanismes externes (rareté, preuve sociale, etc.).\n'+
'Pour chaque mécanisme : nomme-le, cite la phrase exacte qui l\'active, explique ce qu\'il fait psychologiquement.\n\n'+
'BLOC 2 — LECTURE NEUROLOGIQUE\n'+
'Quelle tension active ce post ?\n'+
'Quel organe cérébral touche-t-il ?\n'+
'Quel profil d\'acheteur se reconnaît dans ce texte ?\n'+
'Le désir est-il montré ou nommé ? Si nommé, c\'est une erreur — explique pourquoi.\n\n'+
'BLOC 3 — CE QUI MANQUE\n'+
'Sois précis. Pas "c\'est bien écrit".\n'+
'Dis exactement ce qui est absent et ce que cette absence coûte au post.\n\n'+
'BLOC 4 — ANGLE INEXPLOITÉ\n'+
'Basé uniquement sur ce que l\'auteur a dans les mains dans ce post.\n'+
'Montre un angle qu\'il n\'a pas utilisé et comment il aurait pu l\'activer.\n\n'+
'RÈGLES DE RÉPONSE :\n'+
'- Tutoiement strict\n'+
'- Zéro introduction, zéro conclusion morale\n'+
'- Phrases courtes\n'+
'- Le mot "paix" est banni';
}

/* ÉCRAN DÉCON */
var _deconPost='';
var _deconAnalyse=null;
var _deconPrompt='';

function showDecon(){
  render(
    '<span class="eyebrow">Déconstruction</span>'+
    '<h1>Disséquer.</h1>'+
    '<p class="sub">Colle un post — le tien ou celui d\'un concurrent. L\'outil l\'analyse en surface, puis génère un prompt de déconstruction profonde.</p>'+
    '<textarea id="decon-post" rows="8" placeholder="Colle le post ici..."></textarea>'+
    '<div id="decon-err" class="err off">Colle un post pour continuer.</div>'+
    '<button class="btn btn-primary" onclick="runDecon()">Analyser →</button>'
  );
}

function runDecon(){
  var post=document.getElementById('decon-post').value.trim();
  if(post.length<30){document.getElementById('decon-err').classList.remove('off');return;}
  _deconPost=post;
  _deconAnalyse=analyserPostSurface(post);
  var r=_deconAnalyse;
  var blocs=blocsDetectes(r);
  var manque=ceQuiManque(r,blocs);
  var angles=anglesInexploites(r);
  _deconPrompt=genPromptDecon(post,r);

  // AFFICHAGE SURFACE
  var profilLabels={'AUTOMATISEUR':'Automatiseur','OPTIMISEUR_VALEUR':'Opt. Valeur','OPTIMISEUR_PRIX':'Opt. Prix','ELEVATEUR':'Élévateur','LIBERATEUR':'Libérateur'};

  var html=
    '<span class="eyebrow">Analyse de surface</span>'+
    '<h1>Résultat.</h1>'+

    // RYTHME + CHIFFRES
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Lecture générale</span>'+
    '<div class="diag-row"><span class="diag-key">Phrases totales</span><span class="diag-val">'+r.totalPhrases+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Courtes (≤12 mots)</span><span class="diag-val">'+r.phrasesCourtes+' / '+r.totalPhrases+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Rythme</span><span class="diag-val">'+r.rythme+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Tutoiement</span><span class="diag-val">'+(r.tutoiement?'Oui':'Non')+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Ancrage auteur</span><span class="diag-val">'+(r.premierePersInterne?'Oui':'Non')+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Anecdote détectée</span><span class="diag-val">'+(r.anecdote?'Oui':'Non')+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Chiffres</span><span class="diag-val">'+r.chiffres+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Question finale</span><span class="diag-val">'+(r.questionFinale?'Oui':'Non')+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Rupture de rythme</span><span class="diag-val">'+(r.ruptureRythme?'Oui':'Non')+'</span></div>'+
    '</div>'+

    // PROFIL
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Profil probable ciblé</span>'+
    renderScoreBars(r.profilPcts)+
    '<div class="diag-row"><span class="diag-key">Dominant</span><span class="diag-val">'+(profilLabels[r.profilProbable]||r.profilProbable)+'</span></div>'+
    '</div>'+

    // BLOCS DÉTECTÉS
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Blocs détectés</span>'+
    blocs.map(function(b){return '<div class="decon-item"><span class="decon-tag">'+b.b+'</span>'+b.c+'</div>';}).join('')+
    '</div>'+

    // MÉCANISMES EXTERNES
    (r.mecasExternes.length>0?
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Mécanismes externes détectés</span>'+
    r.mecasExternes.map(function(m){return '<div class="decon-item">'+m+'</div>';}).join('')+
    '</div>':'')+

    // CE QUI MANQUE
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Ce qui manque</span>'+
    (manque.length>0?
      manque.map(function(m){return '<div class="decon-item">'+m+'</div>';}).join(''):
      '<div class="decon-item">Structure apparemment complète en surface.</div>')+
    '</div>'+

    // MOTS INTERDITS
    (r.emojis>0||r.hashtags>0||r.motsInterdits.length>0?
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Signaux parasites</span>'+
    (r.emojis>0?'<div class="decon-item">'+r.emojis+' emoji(s) présent(s).</div>':'')+
    (r.hashtags>0?'<div class="decon-item">'+r.hashtags+' hashtag(s) présent(s).</div>':'')+
    (r.motsInterdits.length>0?'<div class="decon-item">Mots parasites : '+r.motsInterdits.join(', ')+'.</div>':'')+
    '</div>':'')+

    // ANGLES
    '<div class="decon-bloc">'+
    '<span class="decon-bloc-title">Angles inexploités</span>'+
    (angles.length>0?
      angles.map(function(a){return '<div class="decon-item">'+a+'</div>';}).join(''):
      '<div class="decon-item">Aucun angle évident manquant en surface.</div>')+
    '</div>'+

    '<hr class="divider">'+
    '<p class="sub">Ce prompt embarque toute la grille Moment Troc. Colle-le dans Claude ou ChatGPT pour la déconstruction profonde.</p>'+
    '<div class="btn-row">'+
    '<button class="btn btn-primary" id="btn-copy-decon" onclick="copyText(_deconPrompt,\'btn-copy-decon\',\'Copier le prompt\')">Copier le prompt</button>'+
    '</div>'+
    '<div class="btn-row" style="margin-top:6px;">'+
    '<button class="btn btn-claude" onclick="copyText(_deconPrompt,\'btn-claude-decon\',\'Copier\');window.open(\'https://claude.ai/new\',\'_blank\')" id="btn-claude-decon">Copier + Ouvrir Claude ↗</button>'+
    '<button class="btn btn-gpt" onclick="copyText(_deconPrompt,\'btn-gpt-decon\',\'Copier\');window.open(\'https://chatgpt.com/\',\'_blank\')" id="btn-gpt-decon">Copier + ChatGPT ↗</button>'+
    '</div>'+
    '<button class="btn btn-ghost" onclick="showDecon()" style="margin-top:10px;">Nouveau post</button>';

  render(html);
}

/* CALENDRIER */
var ZONES={
  'Masque':{jours:[1,2,3,4,5,6,7],label:'Masque — J1 à J7'},
  'Déclencheur':{jours:[8,9,10,11,12,13,14,15],label:'Déclencheur — J8 à J15'},
  'Fissure':{jours:[16,17,18,19,20,21,22],label:'Fissure — J16 à J22'},
  'Reconstruction':{jours:[23,24,25,26,27,28,29,30],label:'Reconstruction — J23 à J30'}
};

function calData(){
  // Construit un index jour -> post depuis l'Arsenal
  var items=getArsenal();
  var cal={};
  // Placement automatique : on remplit les cases vides dans l'ordre
  var occupied={};
  // D'abord charger les placements manuels (si existent)
  try{
    var saved=JSON.parse(localStorage.getItem('mt_cal')||'{}');
    Object.keys(saved).forEach(function(j){occupied[parseInt(j)]=saved[j];});
  }catch(e){}
  // Ensuite placer les posts non encore placés
  items.forEach(function(item){
    if(item.placed)return;
    var zone=ZONES[item.niveau];
    if(!zone)return;
    // Trouver la première case libre dans la zone
    var placed=false;
    zone.jours.forEach(function(j){
      if(!placed&&!occupied[j]){
        occupied[j]={post:item.post,profil:item.profil,niveau:item.niveau,id:item.id};
        placed=true;
      }
    });
  });
  return occupied;
}

function renderCal(){
  var cal=calData();
  var html='';
  Object.keys(ZONES).forEach(function(zone){
    var z=ZONES[zone];
    html+='<div class="cal-zone-label">'+z.label+'</div>';
    html+='<div class="cal-grid">';
    z.jours.forEach(function(j){
      var item=cal[j];
      if(item){
        var abr={'AUTOMATISEUR':'AUT','OPTIMISEUR_VALEUR':'O.VAL','OPTIMISEUR_PRIX':'O.PX','ELEVATEUR':'ELV','LIBERATEUR':'LIB'};
        html+='<div class="cal-cell filled" onclick="openCalCell('+j+')">'+
          '<span class="cc-day">J'+j+'</span>'+
          '<span class="cc-num">'+j+'</span>'+
          '<span class="cc-profil">'+(abr[item.profil]||item.profil.substring(0,3))+'</span>'+
          '</div>';
      } else {
        html+='<div class="cal-cell empty" onclick="openCalCell('+j+')">'+
          '<span class="cc-day" style="position:absolute;top:8px;left:10px;">J'+j+'</span>'+
          '<span class="cc-plus">+</span>'+
          '</div>';
      }
    });
    html+='</div>';
  });
  document.getElementById('cal-content').innerHTML=html;
}

function openCalCell(j){
  var cal=calData();
  var item=cal[j];
  var modal=document.createElement('div');
  modal.className='cal-modal';
  if(item){
    var profilLabels={'AUTOMATISEUR':'Automatiseur','OPTIMISEUR_VALEUR':'Opt. Valeur','OPTIMISEUR_PRIX':'Opt. Prix','ELEVATEUR':'Élévateur','LIBERATEUR':'Libérateur'};
    modal.innerHTML='<div class="cal-modal-inner">'+
      '<div class="cal-modal-title">Jour '+j+'</div>'+
      '<div class="cal-modal-meta">'+(profilLabels[item.profil]||item.profil)+' · '+item.niveau+'</div>'+
      '<div class="cal-modal-post">'+esc(item.post)+'</div>'+
      '<button class="btn-cal btn-cal-gold" onclick="copierPostCal('+j+')">Copier ce post</button>'+
      '<button class="btn-cal btn-cal-gold" onclick="deconPost(\''+j+'\')">Déconstruire ce post →</button>'+
      '<button class="btn-cal btn-cal-dim" onclick="viderCase('+j+')">Vider cette case</button>'+
      '<button class="btn-cal btn-cal-dim" onclick="fermerModal()">Fermer</button>'+
    '</div>';
  } else {
    modal.innerHTML='<div class="cal-modal-inner">'+
      '<div class="cal-modal-title">Jour '+j+'</div>'+
      '<div class="cal-modal-meta" style="margin-bottom:16px;">Case vide</div>'+
      '<p style="color:var(--cal-ink-mid);font-style:italic;font-size:0.85rem;margin-bottom:16px;">Sauvegarde un post dans l\'Arsenal avec le bon niveau pour qu\'il apparaisse ici.</p>'+
      '<button class="btn-cal btn-cal-gold" onclick="fermerModal();goNav(\'arsenal\')">Aller à l\'Arsenal →</button>'+
      '<button class="btn-cal btn-cal-dim" onclick="fermerModal()">Fermer</button>'+
    '</div>';
  }
  document.body.appendChild(modal);
  window._calModal=modal;
  window._calData=cal;
}

function fermerModal(){
  if(window._calModal){document.body.removeChild(window._calModal);window._calModal=null;}
}

function copierPostCal(j){
  var item=window._calData&&window._calData[j];
  if(!item)return;
  copyText(item.post,'btn-copy-cal-'+j,'Copier ce post');
  fermerModal();
}

function deconPost(j){
  var item=window._calData&&window._calData[j];
  if(!item)return;
  fermerModal();
  _deconPost=item.post;
  _deconAnalyse=analyserPostSurface(item.post);
  _deconPrompt=genPromptDecon(item.post,_deconAnalyse);
  goNav('decon');
  setTimeout(function(){
    var ta=document.getElementById('decon-post');
    if(ta){ta.value=item.post;runDecon();}
  },100);
}

function viderCase(j){
  try{
    var saved=JSON.parse(localStorage.getItem('mt_cal')||'{}');
    delete saved[j];
    localStorage.setItem('mt_cal',JSON.stringify(saved));
  }catch(e){}
  fermerModal();
  renderCal();
}

/* INIT */
(function(){
  var k=localStorage.getItem('mt_key');
  if(k&&KEYS.indexOf(k)!==-1){
    document.getElementById('main-nav').style.display='flex';
    showStudio();
  } else {
    showKey();
  }
})();
</script>
