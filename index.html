<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moment Troc · Studio</title>
    <style>
        :root {
            --bg: #080808; --surface: #0F0F0F; --surface2: #141414;
            --accent: #C9A84C; --accent-dim: rgba(201,168,76,0.18); --accent-line: rgba(201,168,76,0.35); --accent-glow: rgba(201,168,76,0.12);
            --text: #F0EAD6; --text-mid: rgba(240,234,214,0.60); --text-dim: rgba(240,234,214,0.28); --text-ghost: rgba(240,234,214,0.10);
            --border: rgba(201,168,76,0.10); --border-hard: rgba(201,168,76,0.22); --ok: #4a9e6a; --err: #9e4a4a;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--bg); color:var(--text); font-family:'Georgia',serif; font-size:1.05rem; line-height:1.7; min-height:100vh; padding:28px 18px 120px; max-width:720px; margin:0 auto; }
        .off { display:none!important; }
        h1 { font-family:'Georgia',serif; font-size:clamp(2.4rem,8vw,3.2rem); font-weight:700; line-height:0.95; text-transform:uppercase; color:var(--text); }
        h1 i { font-style:italic; font-weight:700; color:var(--accent); text-transform:none; font-size:0.85em; display:block; }
        .eyebrow { font-family:'Courier New',monospace; font-size:0.65rem; letter-spacing:4px; text-transform:uppercase; color:var(--accent); margin-bottom:12px; }
        .sub { color:var(--text-mid); font-size:1rem; margin:14px 0 24px; font-style:italic; }
        textarea, input[type="text"], input[type="password"] { width:100%; background:var(--surface2); border:1px solid var(--border); border-left:2px solid var(--accent-line); color:var(--text); padding:16px 18px; font-family:'Georgia',serif; font-size:1rem; line-height:1.7; resize:vertical; outline:none; border-radius:2px; }
        textarea:focus, input:focus { border-left-color:var(--accent); }
        .btn { display:block; width:100%; padding:16px 20px; border:none; font-family:'Courier New',monospace; font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; cursor:pointer; margin-top:12px; border-radius:2px; transition:all 0.2s ease; }
        .btn-primary { background:transparent; color:var(--accent); border:1px solid var(--accent-line); border-left:3px solid var(--accent); }
        .btn-primary:hover { background:var(--accent-dim); border-color:var(--accent); }
        .btn-ghost { background:transparent; border:1px solid var(--border-hard); color:var(--text-dim); }
        .btn-ghost:hover { border-color:var(--accent-line); color:var(--text); }
        .btn:disabled { opacity:0.25; cursor:not-allowed; }
        .card { background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--accent-line); padding:22px 20px; margin-bottom:18px; border-radius:2px; position:relative; overflow:hidden; }
        .card::before { content:''; position:absolute; top:0; left:0; width:40px; height:2px; background:var(--accent); }
        .card.gold { border-top-color:var(--accent); }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px; }
        .tag { display:inline-block; font-family:'Courier New',monospace; font-size:0.62rem; letter-spacing:2px; padding:4px 10px; text-transform:uppercase; border-radius:2px; margin-right:6px; }
        .tag.gold { background:var(--accent-dim); color:var(--accent); border:1px solid var(--accent-line); }
        .tag.line { background:transparent; border:1px solid var(--border-hard); color:var(--text-dim); }
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
        .post-content { font-family:'Georgia',serif; font-size:1.15rem; line-height:2; white-space:pre-wrap; color:var(--text); padding:28px 0; }
        .err-msg { background:rgba(158,74,74,0.08); border-left:2px solid var(--err); padding:12px 16px; margin:12px 0; font-family:'Courier New',monospace; font-size:0.8rem; color:var(--err); border-radius:0 2px 2px 0; }
        .ok-msg { background:rgba(74,158,106,0.08); border-left:2px solid var(--ok); padding:10px 14px; margin:8px 0; font-family:'Courier New',monospace; font-size:0.8rem; color:var(--ok); border-radius:0 2px 2px 0; }
        .progress { width:100%; height:2px; background:var(--border); margin-top:16px; border-radius:2px; overflow:hidden; }
        .progress-fill { width:0%; height:100%; background:var(--accent); border-radius:2px; animation:fill 2.2s ease infinite; }
        @keyframes fill { 0%{width:0%;} 50%{width:80%;} 100%{width:0%;} }
        .field { margin-bottom:24px; }
        .flabel { font-family:'Courier New',monospace; font-size:0.6rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:10px; }
        .sgrid { display:flex; gap:8px; flex-wrap:wrap; }
        .sgrid.c3 .sitem { flex:1; min-width:90px; }
        .sitem { background:var(--surface2); border:1px solid var(--border); padding:12px 10px; text-align:center; cursor:pointer; border-radius:2px; transition:all 0.2s ease; }
        .sitem.on { background:var(--accent-dim); border-color:var(--accent-line); border-top:2px solid var(--accent); }
        .sitem .sname { font-family:'Courier New',monospace; font-size:0.7rem; letter-spacing:1px; text-transform:uppercase; color:var(--text); }
        .sitem.on .sname { color:var(--accent); }
        .angle-card { background:var(--surface2); border:1px solid var(--border); padding:14px; cursor:pointer; border-radius:2px; transition:all 0.2s; }
        .angle-card:hover { border-color:var(--accent-line); background:var(--accent-dim); }
        .angle-card.selected { border-color:var(--accent); }
        .cal { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; margin-top:16px; }
        .cal-day { aspect-ratio:1; background:var(--surface2); border:1px solid var(--border); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; transition:all 0.2s ease; position:relative; border-radius:2px; font-family:'Courier New',monospace; }
        .cal-day.num { font-size:1rem; color:var(--text-dim); }
        .cal-day.ep { font-size:0.55rem; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); margin-top:3px; }
        .cal-day.off { opacity:0.22; cursor:default; pointer-events:none; }
        .cal-day.set { background:var(--surface); border:1px solid var(--accent-line); border-top:2px solid var(--accent); cursor:pointer; }
        .cal-day.set .num { color:var(--text); font-weight:500; }
        .cal-day.set:hover { background:var(--accent-dim); border-color:var(--accent); }
        .cal-day.placeholder { cursor:pointer; border-top:2px solid var(--text-ghost); }
        .cal-day.placeholder:hover { border-top-color:var(--accent-line); background:var(--surface); }
        .day-detail { background:var(--surface); border:1px solid var(--border); border-top:2px solid var(--accent); padding:22px 20px; margin-top:16px; border-radius:2px; position:relative; }
        .day-detail::before { content:''; position:absolute; top:0; left:0; width:60px; height:2px; background:var(--accent); }
        .preview { font-family:'Georgia',serif; font-size:1rem; line-height:1.85; color:var(--text-mid); white-space:pre-wrap; margin:14px 0; border-left:1px solid var(--accent-line); padding-left:16px; font-style:italic; }
        .actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:14px; }
        .actions .btn { flex:1; min-width:120px; margin-top:0; }
        .bottom { position:fixed; bottom:0; left:0; right:0; background:rgba(8,8,8,0.96); border-top:1px solid var(--border-hard); display:flex; justify-content:space-around; padding:6px 0 8px; z-index:1000; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }
        .nav-item { display:flex; flex-direction:column; align-items:center; gap:4px; cursor:pointer; padding:8px 14px; transition:all 0.2s ease; font-family:'Courier New',monospace; font-size:0.58rem; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; border:none; background:none; position:relative; }
        .nav-item::after { content:''; position:absolute; bottom:0; left:50%; transform:translateX(-50%); width:0; height:1px; background:var(--accent); transition:width 0.2s ease; }
        .nav-item.active { color:var(--accent); }
        .nav-item.active::after { width:24px; }
        .nav-ico { font-size:1.1rem; }
        a { color:var(--accent); }
    </style>
</head>
<body>
<div id="app"></div>
<nav class="bottom">
    <button class="nav-item active" onclick="go('studio')"><span class="nav-ico">🎯</span>Studio</button>
    <button class="nav-item" onclick="go('deconstruction')"><span class="nav-ico">🔬</span>Déconstruire</button>
    <button class="nav-item" onclick="go('trockit')"><span class="nav-ico">💎</span>Troc Kit</button>
    <button class="nav-item" onclick="go('arsenal')"><span class="nav-ico">📅</span>Arsenal</button>
</nav>
<script>
// ═══════════════════════════════════════════
// MOMENT TROC · STUDIO — Code complet
// ═══════════════════════════════════════════

// --- CLÉS ET AUTHENTIFICATION ---
const VALID_KEYS = ['MT-2024A','MT-2024B','MT-2024C','MT-2024D','MT-2024E','MT-2024F','MT-2024G','MT-2024H','MT-2024I','MT-2024J','MT-2024K','MT-2024L','MT-2024M','MT-2024N','MT-2024O','MT-2024P','MT-2024Q','MT-2024R','MT-2024S','MT-2024T','MKB2000-2022A'];
function getMomentKey(){ return localStorage.getItem('mt_moment_key'); }
function setMomentKey(k){ localStorage.setItem('mt_moment_key', k); }
function getGeminiKey(){ return localStorage.getItem('mt_gemini_key'); }
function setGeminiKey(k){ localStorage.setItem('mt_gemini_key', k); }

const MODEL = 'gemini-2.5-flash'; // Modèle principal, plus puissant que Flash-Lite

async function callGeminiFlash(prompt, temp=0.3, maxTokens=600) {
  const key = getGeminiKey();
  if(!key) throw new Error('Clé Gemini manquante');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:temp, maxOutputTokens:maxTokens} })
  });
  if(!res.ok) throw new Error('Erreur API');
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
}

// Ancienne fonction pour modules secondaires (Déconstruction, Troc Kit)
async function callGeminiLite(prompt) {
  const key = getGeminiKey();
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.7, maxOutputTokens:800} })
  });
  if(!res.ok) throw new Error('Erreur API');
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
}

// --- FONCTIONS UTILITAIRES ---
const app = document.getElementById('app');
function render(html) { app.innerHTML = html; }
function esc(s) { return String(s||'').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function copyTxt(text, btn) { navigator.clipboard.writeText(text).then(()=>{ btn.textContent='✓ Copié'; setTimeout(()=>{ btn.textContent='Copier'; },2000); }); }

// --- DÉTECTION AUTOMATIQUE DU PROFIL ---
function detectProfil(tension) {
  const t = tension.toLowerCase();
  if(t.includes('chaos')||t.includes('étape')||t.includes('méthode')||t.includes('surcharge')) return 'AUTOMATISEUR';
  if(t.includes('perte')||t.includes('argent')||t.includes('calcul')||t.includes('roi')) return 'OPTIMISEUR_VALEUR';
  if(t.includes('image')||t.includes('statut')||t.includes('respect')) return 'ÉLÉVATEUR';
  if(t.includes('différent')||t.includes('atypique')||t.includes('case')) return 'LIBÉRATEUR';
  return 'AUTOMATISEUR';
}

// --- ÉTAT GLOBAL ---
let state = {
  mode:'studio',
  step:'unlock', // 'unlock' | 'gemini' | 'brief' | 'grille' | 'result'
  biz:'', tension:'', anecdotes:[], offre:'',
  profil:'',
  grille:null,
  selectedAngle:null,
  currentPost:'',
  // Arsenal
  arsenalPosts: JSON.parse(localStorage.getItem('mt_arsenal_posts')||'{}')
};

// --- GÉNÉRATION D'UN POST (STUDIO) ---
async function generatePost(biz, tension, anecdote, offre, profil, atelier, maitre) {
  const prompt = `Tu es un copywriter d'élite. Écris UN SEUL post Facebook en français.

STRUCTURE OBLIGATOIRE :
1. Hook : une phrase qui nomme la tension.
2. T1 : l'anecdote fournie (prénom, situation, échec).
3. T2 : une rupture qui inverse la croyance.
4. Suture : maximum 8 mots, énigmatique.
5. T3 : la solution (l'offre).
6. T4 : une question ouverte.

RÈGLES :
- Tutoiement. Zéro emoji. Zéro hashtag.
- Phrases très courtes. Prose chirurgicale.
- Pas de "donc", "ainsi".

PROFIL : ${profil}
ATELIER : ${atelier}
MAÎTRE : ${maitre}
BUSINESS : ${biz}
TENSION : ${tension}
ANECDOTE : ${anecdote}
OFFRE : ${offre}`;

  return await callGeminiFlash(prompt, 0.3);
}

// --- NAVIGATION ---
window.go = function(mode) {
  state.mode = mode;
  document.querySelectorAll('.nav-item').forEach((el,i) => {
    el.classList.toggle('active', ['studio','deconstruction','trockit','arsenal'][i]===mode);
  });
  if(mode==='studio') renderStudioFlow();
  else if(mode==='deconstruction') renderDC();
  else if(mode==='trockit') renderTK();
  else if(mode==='arsenal') renderArsenal();
};

// ═══════════════════════════════════════ STUDIO ═══════════════════════════════════════
function renderStudioFlow() {
  const step = state.step;
  if(step==='unlock') renderUnlock();
  else if(step==='gemini') renderGeminiGate();
  else if(step==='brief') renderBrief();
  else if(step==='grille') renderGrille();
  else if(step==='result') renderResult();
  else renderUnlock();
}

function renderUnlock() {
  render(`<div style="margin-top:60px;"><div class="eyebrow">Moment Troc · Studio</div><h1>Clé d'Accès</h1><p class="sub">Entre la clé fournie.</p><input id="key-input" type="text" placeholder="MT-2024X..." autocomplete="off" style="text-transform:uppercase;"><div id="gate-err" style="min-height:20px;color:var(--err);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-primary" onclick="validateMoment()">Entrer →</button></div>`);
}
window.validateMoment = function() {
  const k = document.getElementById('key-input').value.trim().toUpperCase();
  if(VALID_KEYS.includes(k)) { setMomentKey(k); state.step='gemini'; renderStudioFlow(); }
  else { document.getElementById('gate-err').textContent='Clé invalide.'; }
};

function renderGeminiGate() {
  render(`<div style="margin-top:60px;"><div class="eyebrow">Étape 2/2</div><h1>Clé API Gemini</h1><p class="sub">Gratuit sur <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></p><input id="gemini-input" type="password" placeholder="AIza..." autocomplete="off"><div id="gemini-err" style="min-height:20px;color:var(--err);font-size:0.8rem;margin-top:8px;"></div><button class="btn btn-primary" onclick="validateGemini()">Activer →</button></div>`);
}
window.validateGemini = async function() {
  const k = document.getElementById('gemini-input').value.trim();
  if(!k.startsWith('AIza')||k.length<30) { document.getElementById('gemini-err').textContent='Clé invalide.'; return; }
  try {
    const test = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${k}`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:'OK'}]}],generationConfig:{maxOutputTokens:3}})
    });
    if(!test.ok) throw new Error('Clé rejetée');
    setGeminiKey(k); state.step='brief'; renderStudioFlow();
  } catch(e) { document.getElementById('gemini-err').textContent='Clé rejetée.'; }
};

function renderBrief() {
  render(`<div class="eyebrow">Brief</div><h1>Décharge ton business</h1>
    <div class="field"><div class="flabel">Ton business</div><textarea id="biz" rows="2" placeholder="Ex: Formations pour freelances...">${state.biz}</textarea></div>
    <div class="field"><div class="flabel">La tension client</div><textarea id="tension" rows="2" placeholder="Ex: Il croit que vendre est un don...">${state.tension}</textarea></div>
    <div class="field"><div class="flabel">3 anecdotes (Prénom, échec, résultat)</div>
    <textarea id="anecdote1" rows="2" placeholder="Anecdote 1">${state.anecdotes[0]||''}</textarea>
    <textarea id="anecdote2" rows="2" placeholder="Anecdote 2" style="margin-top:8px;">${state.anecdotes[1]||''}</textarea>
    <textarea id="anecdote3" rows="2" placeholder="Anecdote 3" style="margin-top:8px;">${state.anecdotes[2]||''}</textarea></div>
    <div class="field"><div class="flabel">Ton offre</div><textarea id="offre" rows="2" placeholder="Ex: Formation rédaction persuasive...">${state.offre}</textarea></div>
    <button class="btn btn-primary" onclick="goToGrille()">Générer la grille →</button>
    <div id="brief-err" class="err-msg"></div>`);
}

window.goToGrille = function() {
  const biz = document.getElementById('biz').value.trim();
  const tension = document.getElementById('tension').value.trim();
  const a1 = document.getElementById('anecdote1').value.trim();
  const a2 = document.getElementById('anecdote2').value.trim();
  const a3 = document.getElementById('anecdote3').value.trim();
  const offre = document.getElementById('offre').value.trim();
  if(!biz||!tension||!a1||!offre) { document.getElementById('brief-err').textContent='Remplis tous les champs.'; return; }
  state.biz=biz; state.tension=tension; state.anecdotes=[a1,a2,a3]; state.offre=offre;
  state.profil = detectProfil(tension);
  // Grille inspirée de la structure thèmes/angles validée
  state.grille = [
    {theme:'LE PROFIL', angles:['Il ne veut pas comprendre','Il calcule tout','Il achète l\'image']},
    {theme:'L\'ORGANE', angles:['Le chaos','Le calcul','L\'image']},
    {theme:'LE DÉCLENCHEUR', angles:['La peur','Le désir','L\'urgence']},
  ];
  state.step='grille';
  renderStudioFlow();
};

function renderGrille() {
  let html = `<div class="eyebrow">Grille</div><h1>Choisis ton angle</h1><p class="sub">Profil détecté : ${state.profil}</p>`;
  state.grille.forEach(th => {
    html += `<h3 style="margin-top:20px;">${th.theme}</h3>`;
    th.angles.forEach(ang => {
      html += `<div class="angle-card" onclick="selectAngle('${th.theme}','${ang}')">${ang}</div>`;
    });
  });
  html += `<button class="btn btn-primary" id="btn-post" onclick="generateStudioPost()" disabled>Générer le post →</button>`;
  render(html);
}

window.selectAngle = function(theme, angle) {
  state.selectedAngle = {theme, angle};
  document.querySelectorAll('.angle-card').forEach(c=>c.classList.remove('selected'));
  event.target.classList.add('selected');
  document.getElementById('btn-post').disabled = false;
};

window.generateStudioPost = async function() {
  const {theme, angle} = state.selectedAngle;
  const anecdote = state.anecdotes[Math.floor(Math.random()*3)];
  const ateliers = ['Miroir','Forge','Closing'];
  const atelier = ateliers[Math.floor(Math.random()*3)];
  const maitres = ['Will Aime','Itachi','Hannibal','Youssoupha','Scofield','Frank','Tyrion'];
  const maitre = maitres[Math.floor(Math.random()*7)];
  render(`<div class="eyebrow">Génération</div><h1>L'agent travaille...</h1><div class="card"><p>Thème : ${theme} / ${angle}</p><p>Profil : ${state.profil} | Atelier : ${atelier} | Maître : ${maitre}</p><div class="progress"><div class="progress-fill"></div></div></div>`);
  try {
    const post = await generatePost(state.biz, state.tension, anecdote, state.offre, state.profil, atelier, maitre);
    state.currentPost = post;
    state.step='result';
    renderStudioFlow();
  } catch(e) {
    app.innerHTML+=`<div class="err-msg">Erreur : ${e.message}</div>`;
  }
};

function renderResult() {
  render(`<div class="eyebrow">Post généré</div><div class="card"><span class="tag gold">${state.profil}</span><div class="post-content">${esc(state.currentPost)}</div><div class="actions"><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(state.currentPost)},this)">Copier</button><button class="btn btn-ghost" onclick="state.step='grille';renderStudioFlow();">Autre angle</button><button class="btn btn-primary" onclick="saveToArsenal()">Sauvegarder</button></div></div>`);
}

// ═══════════════════════════════════════ DÉCONSTRUCTION ═══════════════════════════
function renderDC() {
  render(`<div class="eyebrow">Déconstruction</div><h1>L'agent dissèque</h1><p class="sub">Colle un post.</p>
    <textarea id="dc-post" rows="8" placeholder="Colle ici..."></textarea>
    <textarea id="dc-contexte" rows="2" placeholder="Contexte..." style="margin-top:12px;"></textarea>
    <button class="btn btn-primary" onclick="runDC()">Autopsie →</button>
    <div id="dc-prog" class="off"><div class="progress"><div class="progress-fill"></div></div></div>
    <div id="dc-error" class="off"></div><div id="dc-result" class="off"></div>`);
}
window.runDC = async function() {
  const post = document.getElementById('dc-post').value.trim();
  if (!post || post.length<30) return;
  document.getElementById('dc-prog').classList.remove('off');
  document.getElementById('dc-result').classList.add('off');
  try {
    const raw = await callGeminiLite(`Analyse ce post en 3 phrases : ${post.slice(0,1000)}`);
    const contre = await callGeminiLite(`Contre-angle pour : "${post.slice(0,800)}". T1-T2-Suture-T3-T4.`);
    document.getElementById('dc-prog').classList.add('off');
    document.getElementById('dc-result').classList.remove('off');
    document.getElementById('dc-result').innerHTML = `<div class="card"><div class="eyebrow">Rapport</div><p>${esc(raw)}</p></div><div class="card gold"><div class="eyebrow">Contre-Angle</div><div class="post-content">${esc(contre)}</div><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(contre)},this)">Copier</button></div>`;
  } catch(e) { document.getElementById('dc-error').innerHTML=`<div class="err-msg">${e.message}</div>`; document.getElementById('dc-error').classList.remove('off'); }
};

// ═══════════════════════════════════════ TROC KIT ═══════════════════════════
let tkProfil = 'AUTOMATISEUR', tkMode = 'désir';
function renderTK() {
  const profils = ['AUTOMATISEUR','OPTIMISEUR_VALEUR','OPTIMISEUR_PRIX','ÉLÉVATEUR','LIBÉRATEUR'];
  render(`<div class="eyebrow">Troc Kit</div><h1>Le script</h1>
    <textarea id="tk-offre" rows="3" placeholder="Ton offre..."></textarea>
    <div class="field"><div class="flabel">Profil</div><div class="sgrid">${profils.map(p=>`<div class="sitem ${tkProfil===p?'on':''}" onclick="tkProfil='${p}';renderTK();">${p.replace('_',' ')}</div>`).join('')}</div></div>
    <div class="field"><div class="flabel">Mode</div><div class="sgrid c3"><div class="sitem ${tkMode==='désir'?'on':''}" onclick="tkMode='désir';renderTK();">🟢 Désir</div><div class="sitem ${tkMode==='peur'?'on':''}" onclick="tkMode='peur';renderTK();">🔴 Peur</div></div></div>
    <button class="btn btn-primary" onclick="runTK()">Générer →</button>
    <div id="tk-prog" class="off"><div class="progress"><div class="progress-fill"></div></div></div>
    <div id="tk-result" class="off"></div>`);
}
window.runTK = async function() {
  const offre = document.getElementById('tk-offre').value.trim();
  if(!offre) return;
  document.getElementById('tk-prog').classList.remove('off');
  try {
    const raw = await callGeminiLite(`Offre : "${offre}". Profil : ${tkProfil}. Génère 4 scripts (---SEP---) : Approche, Valeur, Relance, Objection.`);
    document.getElementById('tk-prog').classList.add('off');
    document.getElementById('tk-result').classList.remove('off');
    document.getElementById('tk-result').innerHTML = raw.split('---SEP---').map(s=>`<div class="card"><div class="post-content">${esc(s.trim())}</div><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(s.trim())},this)">Copier</button></div>`).join('');
  } catch(e) { document.getElementById('tk-prog').classList.add('off'); }
};

// ═══════════════════════════════════════ ARSENAL ═══════════════════════════
window.saveToArsenal = function() {
  if(!state.currentPost) return;
  let day = null;
  for(let d=2; d<=30; d+=2) { if(!state.arsenalPosts[d]){ day=d; break; } }
  if(!day){ alert('Mois plein.'); return; }
  state.arsenalPosts[day] = { text:state.currentPost, profil:state.profil, savedAt:Date.now() };
  localStorage.setItem('mt_arsenal_posts', JSON.stringify(state.arsenalPosts));
  alert('Sauvegardé au jour '+day);
};
function renderArsenal() {
  let h = '<div class="eyebrow">Arsenal</div><h1>Calendrier</h1><div class="cal">';
  for(let d=1; d<=30; d++) {
    const p = state.arsenalPosts[d];
    if(d%2===0) {
      if(p) h += `<div class="cal-day set" onclick="viewPost(${d})"><span class="num">J${d}</span></div>`;
      else h += `<div class="cal-day placeholder" onclick="viewPost(${d})"><span class="num">+</span></div>`;
    } else h += `<div class="cal-day off"><span class="num">J${d}</span></div>`;
  }
  h += '</div><div id="arsenal-detail" class="day-detail off"></div>';
  render(h);
}
window.viewPost = function(day) {
  const p = state.arsenalPosts[day];
  const el = document.getElementById('arsenal-detail');
  if(!p) { el.innerHTML = `<div class="eyebrow">Jour ${day}</div><p>Vide.</p>`; el.classList.remove('off'); return; }
  el.innerHTML = `<div class="eyebrow">Jour ${day}</div><div class="preview">${esc(p.text)}</div><div class="actions"><button class="btn btn-ghost" onclick="copyTxt(${JSON.stringify(p.text)},this)">Copier</button></div>`;
  el.classList.remove('off');
};

// --- INITIALISATION ---
window.onload = function() {
  const mk = getMomentKey();
  const gk = getGeminiKey();
  if(mk && VALID_KEYS.includes(mk) && gk && gk.length>30) {
    state.step='brief';
  } else if(mk && VALID_KEYS.includes(mk)) {
    state.step='gemini';
  } else {
    state.step='unlock';
  }
  renderStudioFlow();
};
</script>
