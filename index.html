<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moment Troc · Studio V4</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Space+Mono:wght@400;700&family=Archivo+Black&display=swap" rel="stylesheet">
<style>
:root{--bg:#F5F0E8;--surface:#EDE8DF;--surface2:#E4DDD4;--ink:#1A1714;--ink-mid:rgba(26,23,20,0.52);--ink-dim:rgba(26,23,20,0.25);--rust:#B5451B;--rust-dim:rgba(181,69,27,0.10);--rust-line:rgba(181,69,27,0.28);--border:rgba(26,23,20,0.09);--border-hard:rgba(26,23,20,0.18);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--ink);font-family:'Playfair Display',Georgia,serif;font-size:1rem;line-height:1.75;min-height:100vh;padding:32px 20px 110px;max-width:660px;margin:0 auto;}
.eyebrow{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:4px;text-transform:uppercase;color:var(--rust);margin-bottom:8px;display:block;}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(2.2rem,9vw,3rem);font-weight:900;line-height:0.95;text-transform:uppercase;letter-spacing:-0.02em;color:var(--ink);margin-bottom:10px;}
.sub{font-style:italic;color:var(--ink-mid);font-size:0.93rem;margin-bottom:24px;line-height:1.6;}
textarea,input[type=password]{width:100%;background:var(--surface2);border:none;border-left:3px solid var(--rust-line);color:var(--ink);padding:14px 16px;font-family:'Playfair Display',serif;font-size:1rem;line-height:1.7;resize:vertical;outline:none;margin-top:8px;transition:border-color 0.2s;-webkit-appearance:none;border-radius:0;}
textarea:focus,input:focus{border-left-color:var(--rust);}
.btn{display:block;width:100%;padding:15px 18px;border:none;font-family:'Space Mono',monospace;font-size:0.63rem;letter-spacing:3px;text-transform:uppercase;cursor:pointer;margin-top:10px;transition:all 0.18s;background:transparent;text-align:center;text-decoration:none;border-radius:0;}
.btn-primary{color:var(--rust);border:1px solid var(--rust-line);border-left:3px solid var(--rust);}
.btn-primary:hover,.btn-primary:active{background:var(--rust-dim);}
.btn-ghost{color:var(--ink-mid);border:1px solid var(--border-hard);}
.btn-ghost:hover,.btn-ghost:active{border-color:var(--rust-line);color:var(--ink);}
.btn-row{display:flex;gap:8px;margin-top:10px;}
.btn-row .btn{margin-top:0;flex:1;}
.card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--rust);padding:18px;margin-bottom:14px;}
.card-label{font-family:'Space Mono',monospace;font-size:0.56rem;letter-spacing:3px;text-transform:uppercase;color:var(--rust);margin-bottom:10px;display:block;}
.diag-row{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border);font-family:'Space Mono',monospace;font-size:0.65rem;gap:12px;}
.diag-row:last-child{border-bottom:none;}
.diag-key{color:var(--ink-dim);letter-spacing:2px;text-transform:uppercase;white-space:nowrap;}
.diag-val{color:var(--rust);text-align:right;max-width:65%;line-height:1.4;}
.niveau-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0 16px;}
.niv{background:var(--surface2);border:1px solid var(--border-hard);border-left:3px solid transparent;padding:13px 11px;cursor:pointer;transition:all 0.18s;text-align:left;}
.niv.on{border-left-color:var(--rust);background:var(--rust-dim);}
.niv .nt{font-family:'Space Mono',monospace;font-size:0.58rem;letter-spacing:2px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:3px;}
.niv .nd{font-style:italic;font-size:0.78rem;color:var(--ink-mid);line-height:1.35;}
.maitre-preview{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rust-line);padding:14px;margin-bottom:8px;}
.maitre-preview .mp-name{font-family:'Archivo Black',sans-serif;font-size:0.82rem;text-transform:uppercase;color:var(--ink);display:block;margin-bottom:2px;}
.maitre-preview .mp-il{font-family:'Space Mono',monospace;font-size:0.55rem;letter-spacing:2px;text-transform:uppercase;color:var(--rust);display:block;margin-bottom:4px;}
.maitre-preview .mp-desc{font-style:italic;font-size:0.8rem;color:var(--ink-mid);line-height:1.4;}
.prompt-box{background:var(--surface2);border-left:3px solid var(--rust);padding:16px;font-family:'Space Mono',monospace;font-size:0.68rem;line-height:1.85;color:var(--ink);white-space:pre-wrap;word-break:break-word;max-height:400px;overflow-y:auto;margin:10px 0;}
.arsenal-item{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--rust-line);padding:16px;margin-bottom:10px;position:relative;}
.arsenal-item .am{font-family:'Space Mono',monospace;font-size:0.53rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink-dim);margin-bottom:8px;}
.arsenal-item .at{font-size:0.93rem;line-height:1.7;color:var(--ink);white-space:pre-wrap;}
.arsenal-item .ad{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--ink-dim);font-family:'Space Mono',monospace;font-size:0.53rem;cursor:pointer;text-transform:uppercase;}
.err{color:#c0392b;font-family:'Space Mono',monospace;font-size:0.68rem;margin-top:8px;padding:10px 14px;background:rgba(192,57,43,0.05);border-left:3px solid #c0392b;}
.off{display:none!important;}
.divider{border:none;border-top:1px solid var(--border);margin:20px 0;}
.nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border-hard);display:flex;justify-content:space-around;padding:8px 0 14px;z-index:100;}
.nb{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 16px;opacity:0.3;transition:opacity 0.2s;}
.nb.on{opacity:1;}
.nb .ni{font-size:1.15rem;}
.nb .nl{font-family:'Space Mono',monospace;font-size:0.46rem;letter-spacing:2px;text-transform:uppercase;color:var(--ink);}
</style>
</head>
<body>
<div id="app"></div>
<nav class="nav" id="main-nav" style="display:none;">
  <button class="nb on" id="nb-studio" onclick="goNav('studio')"><span class="ni">✦</span><span class="nl">Studio</span></button>
  <button class="nb" id="nb-arsenal" onclick="goNav('arsenal')"><span class="ni">◈</span><span class="nl">Arsenal</span></button>
</nav>
<script>
var KEYS=['MKB2000-2022A','MT-A1B2-C3D4','MT-E5F6-G7H8','MT-I9J0-K1L2','MT-M3N4-O5P6','MT-Q7R8-S9T0','MT-U1V2-W3X4','MT-Y5Z6-A7B8','MT-C9D0-E1F2','MT-G3H4-I5J6','MT-K7L8-M9N0','MT-O1P2-Q3R4','MT-S5T6-U7V8','MT-W9X0-Y1Z2','MT-A3B4-C5D6','MT-E7F8-G9H0','MT-I1J2-K3L4','MT-M5N6-O7P8','MT-Q9R0-S1T2','MT-U3V4-W5X6'];

var MAITRES={
  bismarck:{n:'Bismarck',il:'Force Tranquille',im:'T1',desc:"Il n'argumente pas. Il decrete. T1 pose l'autorite sans l'expliquer. Ce qu'il ne fait pas : ne justifie jamais.",tags:['autorite','statut','leadership','credibilite']},
  will_aime:{n:'Will Aime',il:'Vertige Controle',im:'Suture',desc:"Guide dans une piece familiere. La Suture fait basculer les murs. Ce qu'il ne fait pas : ne revele jamais trop tot.",tags:['emotion','transformation','reconnaissance','identite']},
  itachi:{n:'Itachi',il:'Genjutsu',im:'T4',desc:"Le lecteur croit lire un post normal. T4 brise l'illusion. Ce qu'il ne fait pas : ne montre jamais le piege a l'avance.",tags:['illusion','revelation','surprise','profil']},
  scofield:{n:'Scofield',il:'Blueprint',im:'T1',desc:"T1 construit un couloir invisible. Le lecteur suit sans voir le plan. Ce qu'il ne fait pas : n'explique jamais le plan.",tags:['acces','etapes','methode','systeme','technique','api','freelance']},
  tyrion:{n:'Tyrion',il:'Scalpel Court',im:'T2',desc:"La phrase courte bat la longue. T2 est un coup de lame. Ce qu'il ne fait pas : ne s'explique jamais.",tags:['argumentation','objection','comparaison','prix']},
  hannibal:{n:'Hannibal',il:'Scalpel',im:'T2',desc:"Dissèque sans douleur. T2 nomme ce que le lecteur cache. Ce qu'il ne fait pas : ne juge jamais.",tags:['psychologie','comportement','habitude','peur','diagnostic']},
  joker:{n:'Le Joker',il:'Chaos Calcule',im:'T1',desc:"T1 ouvre par une verite absurde. Le lecteur rit jaune puis se reconnait. Ce qu'il ne fait pas : n'est jamais gratuit.",tags:['humour','ironie','paradoxe','marketing']},
  moriarty:{n:'Moriarty',il:"3 Coups d'Avance",im:'T4',desc:"T4 revele que tout etait prevu. Ce qu'il ne fait pas : ne revele jamais avant T4.",tags:['strategie','intelligence','vente','prevision']},
  palpatine:{n:'Palpatine',il:'Faux Mentor',im:'T4',desc:"Ne donne jamais la reponse. T4 pose la question qui destabilise. Ce qu'il ne fait pas : ne rassure jamais.",tags:['doute','questionnement','coaching','mentor']},
  iago:{n:'Iago',il:'Poison Verbal',im:'Suture',desc:"La Suture chuchote ce que le lecteur refuse d'entendre. Ce qu'il ne fait pas : ne crie jamais.",tags:['verite','denial','inconfort','prise de conscience']},
  cobb:{n:'Cobb',il:'Inception',im:'T4',desc:"T4 depose une idee simple presque anodine. Elle grandit apres la lecture. Ce qu'il ne fait pas : n'argumente jamais.",tags:['idee','influence','long terme']},
  mrrobot:{n:'Mr. Robot',il:'Bug dans la Matrice',im:'T3',desc:"T3 denonce le systeme. Montre que le jeu est truque. Ce qu'il ne fait pas : ne propose jamais de consolation.",tags:['systeme','blocage','acces','carte bancaire','afrique','injustice']},
  tyler:{n:'Tyler Durden',il:'Destruction du Confort',im:'T2',desc:"T2 attaque ce que le lecteur croit etre une qualite. Ce qu'il ne fait pas : ne menage jamais.",tags:['confort','securite','stagnation','routine']},
  baelish:{n:'Baelish',il:'Chaos comme Echelle',im:'T3',desc:"T3 montre que le chaos est une opportunite. Ce qu'il ne fait pas : ne moralise jamais.",tags:['opportunite','chaos','marche','positionnement']},
  frank:{n:'Frank Underwood',il:'4e Mur',im:'T1',desc:"T1 brise le quatrieme mur. Juste toi et moi. Ce qu'il ne fait pas : ne parle jamais a la foule.",tags:['confidence','secret','exclusivite','personal branding']},
  v:{n:'V',il:'Revolution Silencieuse',im:'T4',desc:"T4 fait tomber un masque. Revele une verite cachee. Ce qu'il ne fait pas : ne crie jamais sa revolte.",tags:['liberation','verite','changement','mouvement']},
  youssoupha:{n:'Youssoupha',il:'Uppercut Philosophique',im:'T2',desc:"Verite brutale en une phrase. T2 frappe et s'arrete. T3 releve ensuite. Ce qu'il ne fait pas : n'explique jamais l'uppercut.",tags:['verite','philosophie','realite','afrique','freelance']}
};

var PROFILS={
  AUTOMATISEUR:{organe:'Cortex Prefrontal',tension:"J'ai tout essaye, rien ne marche, je suis noye.",desir:"Un rail. Une sequence precise. Un resultat aujourd'hui.",mots:['methode','etapes','systeme','acces','simple','rapide','chemin','sequence','plan','guide','outil','automatisation','workflow','process','api','freelance','intermediaire'],maitres:['scofield','mrrobot','itachi']},
  OPTIMISEUR_VALEUR:{organe:'Striatum',tension:"J'investis sans savoir si ca va rapporter.",desir:"La certitude que chaque franc investi rapporte.",mots:['roi','rentable','retour','investissement','calcul','resultat','efficace','rendement','budget','marge','valeur','productivite'],maitres:['tyrion','moriarty','bismarck']},
  OPTIMISEUR_PRIX:{organe:'Insula',tension:"J'ai peur de me faire arnaquer encore.",desir:"Le juste prix. La transparence totale.",mots:['arnaque','prix','cout','confiance','risque','juste','transparent','garantie','remboursement'],maitres:['hannibal','iago','palpatine']},
  ELEVATEUR:{organe:'Noyau Accumbens',tension:"Les autres reussissent, pas moi. Je ne suis pas credible.",desir:"L'image qui force le respect avant meme de parler.",mots:['image','statut','respect','credibilite','reconnaissance','prestige','marque','premium','elite','regard','admiration'],maitres:['frank','will_aime','baelish']},
  LIBERATEUR:{organe:'Cortex Cingulaire',tension:"Les methodes standard ne marchent pas pour moi.",desir:"Qu'on reconnaisse ma singularite.",mots:['different','unique','sur mesure','adapte','liberte','singulier','atypique','normes','independance'],maitres:['youssoupha','v','joker']}
};

var state={niveau:'',profil:'',brief:'',prompt:'',maitres:[]};
var app=document.getElementById('app');

function render(h){app.innerHTML=h;window.scrollTo(0,0);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function detectProfil(txt){
  var t=txt.toLowerCase();
  var scores={};
  Object.keys(PROFILS).forEach(function(k){scores[k]=0;PROFILS[k].mots.forEach(function(m){if(t.indexOf(m)!==-1)scores[k]++;});});
  var best='AUTOMATISEUR',max=-1;
  Object.keys(scores).forEach(function(k){if(scores[k]>max){max=scores[k];best=k;}});
  return best;
}

function selectMaitres(profil){
  return PROFILS[profil].maitres.map(function(id){return MAITRES[id];});
}

// ═══ COPIER — marche sur tous les mobiles ═══
function copyText(txt,btnId){
  var btn=document.getElementById(btnId);
  var ok=function(){if(btn){btn.textContent='Copie !';setTimeout(function(){btn.textContent='Copier le prompt';},2500);}};
  var fail=function(){
    // Methode de secours : textarea temporaire
    var ta=document.createElement('textarea');
    ta.value=txt;
    ta.setAttribute('readonly','');
    ta.style.cssText='position:fixed;top:0;left:0;width:2em;height:2em;opacity:0;';
    document.body.appendChild(ta);
    ta.focus();ta.select();
    try{var r=document.execCommand('copy');if(r)ok();}catch(e){}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard){
    navigator.clipboard.writeText(txt).then(ok).catch(fail);
  } else {
    fail();
  }
}

// ═══ ÉCRANS ═══

function showKey(){
  render(
    '<span class="eyebrow">Moment Troc · Studio V4</span>'+
    '<h1>Acces</h1>'+
    '<p class="sub">Entre ta cle d\'acces pour activer le Studio.</p>'+
    '<input type="password" id="kf" placeholder="MT-XXXX-XXXX" autocomplete="off">'+
    '<div id="kerr" class="err off">Cle invalide.</div>'+
    '<button class="btn btn-primary" onclick="checkKey()">Activer</button>'
  );
}

function checkKey(){
  var k=document.getElementById('kf').value.trim().toUpperCase();
  if(KEYS.indexOf(k)===-1){document.getElementById('kerr').classList.remove('off');return;}
  localStorage.setItem('mt_key',k);
  document.getElementById('main-nav').style.display='flex';
  showStudio();
}

function showStudio(){
  render(
    '<span class="eyebrow">Etape 1 · Brief</span>'+
    '<h1>Matiere</h1>'+
    '<p class="sub">Decris ton business, ton produit, tes clients. Ajoute des anecdotes reelles si tu en as.</p>'+
    '<textarea id="bf" rows="7" placeholder="Ex : Je vends du jus de canne a sucre a Brazzaville. Mes clients sont des travailleurs et des etudiants. Un jour j\'ai offert un verre a un client qui hesitait...">'+(state.brief||'')+'</textarea>'+
    '<div style="font-family:Space Mono,monospace;font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink-mid);margin:20px 0 8px;">Niveau actuel</div>'+
    '<p class="sub" style="margin-bottom:10px;">Ou en es-tu avec ton audience ?</p>'+
    '<div class="niveau-grid">'+
    [['Masque','Mon audience ne me connait pas encore'],
     ['Declencheur','Ils me voient mais ne comprennent pas'],
     ['Fissure','Ils me reconnaissent, pas encore acheteurs'],
     ['Reconstruction','Ils sont prets, je veux convertir']].map(function(n){
      return '<div class="niv'+(state.niveau===n[0]?' on':'')+'" onclick="selN(\''+n[0]+'\')" data-n="'+n[0]+'">'+
        '<span class="nt">'+n[0]+'</span><span class="nd">'+n[1]+'</span></div>';
    }).join('')+
    '</div>'+
    '<div id="berr" class="err off">Decris ton business et choisis ton niveau.</div>'+
    '<button class="btn btn-primary" onclick="runDiag()">Diagnostic</button>'
  );
}

function selN(n){
  state.niveau=n;
  document.querySelectorAll('.niv').forEach(function(el){el.classList.toggle('on',el.getAttribute('data-n')===n);});
}

function runDiag(){
  var bf=document.getElementById('bf').value.trim();
  if(bf.length<20||!state.niveau){document.getElementById('berr').classList.remove('off');return;}
  state.brief=bf;
  state.profil=detectProfil(bf);
  state.maitres=selectMaitres(state.profil);
  showDiag();
}

function showDiag(){
  var p=PROFILS[state.profil];
  var mh=state.maitres.map(function(m,i){
    return '<div class="maitre-preview">'+
      '<span class="mp-name">Post '+(i+1)+' — '+m.n+'</span>'+
      '<span class="mp-il">'+m.il+' · Impact : '+m.im+'</span>'+
      '<span class="mp-desc">'+m.desc+'</span></div>';
  }).join('');
  render(
    '<span class="eyebrow">Etape 2 · Diagnostic</span>'+
    '<h1>Analyse</h1>'+
    '<div class="card">'+
    '<span class="card-label">Profil detecte</span>'+
    '<div class="diag-row"><span class="diag-key">Profil</span><span class="diag-val">'+state.profil.replace(/_/g,' ')+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Organe</span><span class="diag-val">'+p.organe+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Tension</span><span class="diag-val">'+p.tension+'</span></div>'+
    '<div class="diag-row"><span class="diag-key">Niveau</span><span class="diag-val">'+state.niveau+'</span></div>'+
    '</div>'+
    '<div style="font-family:Space Mono,monospace;font-size:0.62rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink-mid);margin:16px 0 10px;">3 Maitres selectionnes</div>'+
    mh+
    '<button class="btn btn-primary" onclick="genPrompt()">Generer le prompt</button>'+
    '<button class="btn btn-ghost" onclick="showStudio()">Modifier le brief</button>'
  );
}

function genPrompt(){
  var p=PROFILS[state.profil];
  var m=state.maitres;
  var t4n='';
  if(state.niveau==='Masque')t4n='Question ouverte. Une porte. Jamais un ordre.';
  else if(state.niveau==='Declencheur')t4n='Constat qui brule. Le lecteur sait deja.';
  else if(state.niveau==='Fissure')t4n='Revelation. Ce qu\'il refusait de voir.';
  else t4n='Choix binaire. Deux portes. Les deux menent au meme endroit.';

  var prompt=
'Tu es un copywriter neurologique. Tu executes. Tu ecris.\n'+
'Tu n\'expliques pas. Tu n\'introduis pas.\n\n'+
'BUSINESS :\n'+state.brief+'\n\n'+
'PROFIL CIBLE : '+state.profil.replace(/_/g,' ')+' — '+p.organe+'\n'+
'Tension : "'+p.tension+'"\n'+
'Desir cache : '+p.desir+'\n'+
'Ne jamais nommer ce desir. Le montrer en action.\n\n'+
'NIVEAU TUNNEL : '+state.niveau+'\n\n'+
'3 POSTS — 3 MAITRES\n\n'+
'POST 1 — MAITRE : '+m[0].n.toUpperCase()+' — '+m[0].il+'\n'+
'Impact : '+m[0].im+'\n'+
m[0].desc+'\n\n'+
'POST 2 — MAITRE : '+m[1].n.toUpperCase()+' — '+m[1].il+'\n'+
'Impact : '+m[1].im+'\n'+
m[1].desc+'\n\n'+
'POST 3 — MAITRE : '+m[2].n.toUpperCase()+' — '+m[2].il+'\n'+
'Impact : '+m[2].im+'\n'+
m[2].desc+'\n\n'+
'STRUCTURE POUR CHAQUE POST :\n\n'+
'T1 : Vue de l\'interieur. Ce que l\'auteur vit exactement.\n'+
'Le Maitre imprime sa mecanique si son impact est T1.\n\n'+
'T2 : Une seule phrase. Elle dechire une certitude.\n'+
'Le Maitre imprime sa mecanique si son impact est T2.\n\n'+
'SUTURE : Maximum 8 mots. Aucun connecteur. Aucune morale.\n'+
'Un fait brut. Suggere le desir cache sans le nommer.\n\n'+
'T3 : Sequence de faits. Une ligne par fait. Pas d\'explication.\n'+
'Le Maitre imprime sa mecanique si son impact est T3.\n\n'+
'T4 : '+t4n+'\n'+
'Le Maitre imprime sa mecanique si son impact est T4.\n\n'+
'REGLES ABSOLUES :\n'+
'- Tutoiement strict\n'+
'- Zero emoji, zero hashtag\n'+
'- Phrases maximum 12 mots\n'+
'- Jamais : donc, ainsi, par consequent\n'+
'- Pas d\'anecdote inventee\n'+
'- L\'auteur parle depuis l\'interieur de son experience\n'+
'- 3 posts avec mecaniques differentes — pas le meme film\n\n'+
'FORMAT DE SORTIE OBLIGATOIRE :\n'+
'Chaque post doit etre clairement separe.\n'+
'Chaque section labellee : T1 / T2 / SUTURE / T3 / T4\n'+
'Apres chaque post, 3 commentaires :\n'+
'C1 : fait concret qui approfondit T3\n'+
'C2 : objection silencieuse retournee sans la nier\n'+
'C3 : porte naturelle vers l\'action — jamais "achete" ou "contacte"\n\n'+
'Genere les 3 posts complets dans l\'ordre.\n'+
'Arrete apres les 3.\n'+
'Demande : "Ajustements ou on continue ?"';

  state.prompt=prompt;
  showPrompt();
}

function showPrompt(){
  render(
    '<span class="eyebrow">Etape 3 · Prompt</span>'+
    '<h1>Pret</h1>'+
    '<p class="sub">Copie ce prompt. Colle-le dans Claude.ai ou ChatGPT.</p>'+
    '<div class="prompt-box" id="promptbox">'+esc(state.prompt)+'</div>'+
    '<button class="btn btn-primary" id="copybtn" onclick="copyText(state.prompt,\'copybtn\')">Copier le prompt</button>'+
    '<div class="divider"></div>'+
    '<div style="font-family:Space Mono,monospace;font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--ink-mid);margin-bottom:8px;">Ouvrir l\'IA</div>'+
    '<div class="btn-row">'+
    '<a href="https://claude.ai/new" target="_blank" class="btn btn-primary">Claude.ai</a>'+
    '<a href="https://chatgpt.com" target="_blank" class="btn btn-ghost">ChatGPT</a>'+
    '</div>'+
    '<div class="divider"></div>'+
    '<div class="btn-row">'+
    '<button class="btn btn-ghost" onclick="showDiag()">Revoir diagnostic</button>'+
    '<button class="btn btn-ghost" onclick="showStudio()">Nouveau brief</button>'+
    '</div>'+
    '<button class="btn btn-primary" style="margin-top:16px;" onclick="goNav(\'arsenal\')">Aller a l\'Arsenal</button>'
  );
}

function showArsenal(){
  var posts=JSON.parse(localStorage.getItem('mt_arsenal')||'[]');
  var h='<span class="eyebrow">Arsenal</span>'+
    '<h1>Posts</h1>'+
    '<p class="sub">Colle tes posts generes ici. Ils sont sauvegardes.</p>'+
    '<textarea id="apaste" rows="5" placeholder="Colle un post ici..." style="margin-bottom:0;"></textarea>'+
    '<button class="btn btn-primary" onclick="savePost()">Sauvegarder</button>'+
    '<div class="divider"></div>';
  if(posts.length===0){
    h+='<p class="sub" style="text-align:center;padding:16px 0;">Aucun post sauvegarde.</p>';
  } else {
    posts.forEach(function(p,i){
      h+='<div class="arsenal-item">'+
        '<div class="am">'+p.date+' · '+(p.profil||'').replace(/_/g,' ')+'</div>'+
        '<div class="at">'+esc(p.text)+'</div>'+
        '<button class="ad" onclick="delPost('+i+')">Suppr.</button></div>';
    });
  }
  render(h);
}

function savePost(){
  var txt=document.getElementById('apaste').value.trim();
  if(txt.length<10)return;
  var posts=JSON.parse(localStorage.getItem('mt_arsenal')||'[]');
  posts.unshift({text:txt,date:new Date().toLocaleDateString('fr-FR'),profil:state.profil});
  localStorage.setItem('mt_arsenal',JSON.stringify(posts));
  document.getElementById('apaste').value='';
  showArsenal();
}

function delPost(i){
  var posts=JSON.parse(localStorage.getItem('mt_arsenal')||'[]');
  posts.splice(i,1);
  localStorage.setItem('mt_arsenal',JSON.stringify(posts));
  showArsenal();
}

function goNav(s){
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  if(s==='studio'){document.getElementById('nb-studio').classList.add('on');showStudio();}
  else if(s==='arsenal'){document.getElementById('nb-arsenal').classList.add('on');showArsenal();}
}

window.onload=function(){
  var k=localStorage.getItem('mt_key');
  if(k&&KEYS.indexOf(k)!==-1){document.getElementById('main-nav').style.display='flex';showStudio();}
  else{showKey();}
};
</script>
</body>
</html>
